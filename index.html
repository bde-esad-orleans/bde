<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDE — Bureau Des Étudiants</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <h1 class="site-title"><a href="index.html"><span class="title-full">BDE ESAD Orléans</span><span class="title-short">BDE</span></a></h1>
            <button class="nav-burger" aria-label="Menu" onclick="this.classList.toggle('open');document.getElementById('nav-menu').classList.toggle('open')">
                <span></span><span></span><span></span>
            </button>
            <ul id="nav-menu">
                <li><a href="#evenements">Événements</a></li>
                <li><a href="activites.html">Activités</a></li>
                <li><a href="association.html">Association</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <section class="hero">
                <p class="hero-label">Bureau Des Étudiants de l'ESAD Orléans</p>
                <h2>Ce qui se passe,<br>ce qui s'est passé.</h2>
            </section>

            <div class="section-header" id="planning">
                <span class="section-title">Planning</span>
                <span class="section-rule"></span>
            </div>
            <div class="planning-block">
                <img src="assets/images/equipe-et-planning/planning.webp" alt="Planning BDE" id="planning-img" style="max-width: stretch; height: auto; display: block;" />
            </div>

            <div class="section-header" id="evenements">
                <span class="section-title">Événements à venir</span>
                <span class="section-rule"></span>
            </div>
            <div id="events-list"><p class="empty-state">Chargement…</p></div>

            <div class="section-header" id="archives">
                <span class="section-title">Événements passés</span>
                <span class="section-rule"></span>
            </div>
            <div id="archive-list"><p class="empty-state">Chargement…</p></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-inner">
                <span>BDE — Bureau Des Étudiants</span>
                <span><a href="manage.html" style="text-decoration: underline;">Gestion du site</a></span>
                <span id="year"></span>
            </div>
        </div>
    </footer>

    <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Fermer le menu burger en cliquant sur un lien
    document.querySelectorAll('#nav-menu a').forEach(a => {
        a.addEventListener('click', () => {
            document.getElementById('nav-menu').classList.remove('open');
            document.querySelector('.nav-burger').classList.remove('open');
        });
    });

    const MONTHS = ['jan.','fév.','mar.','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];

    function splitDate(dateStr) {
        if (!dateStr) return { day: '', month: '' };
        const [, m, d] = dateStr.split('-');
        return { day: parseInt(d, 10), month: MONTHS[parseInt(m, 10) - 1] };
    }

    function renderCards(events, containerId, emptyMsg) {
        const el = document.getElementById(containerId);
        if (!events || events.length === 0) {
            el.innerHTML = `<p class="empty-state">${emptyMsg}</p>`;
            return;
        }
        el.innerHTML = events.map(e => {
            const { day, month } = splitDate(e.date);
            return `
            <div class="event-card">
                <div class="event-date-col">
                    ${day ? `<span class="event-date-day">${day}</span><span class="event-date-month">${month}</span>` : ''}
                </div>
                <div class="event-body">
                    <h3>${e.titre || 'Événement'}</h3>
                    <div class="event-meta">
                        ${e.heure ? `<span>${e.heure}</span>` : ''}
                        ${e.lieu ? `<span>${e.lieu}</span>` : ''}
                    </div>
                    <a class="detail-link" href="viewer.html?file=${encodeURIComponent(e.file)}">Lire →</a>
                </div>
            </div>`;
        }).join('');
    }

    async function loadSection(jsonPath, containerId, emptyMsg) {
        try {
            const resp = await fetch(jsonPath);
            if (!resp.ok) throw new Error();
            renderCards(await resp.json(), containerId, emptyMsg);
        } catch {
            renderCards([], containerId, emptyMsg);
        }
    }

    loadSection('data/events.json', 'events-list', 'Aucun événement à venir pour le moment.');
    loadSection('data/archive.json', 'archive-list', 'Aucun événement archivé pour le moment.');
    </script>
</body>
</html>
