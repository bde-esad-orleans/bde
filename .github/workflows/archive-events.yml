name: Archive Past Events

on:
  schedule:
    - cron: '0 2 1 * *'  # 1er du mois à 2h UTC
  workflow_dispatch:

jobs:
  archive-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive past events and update JSON
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "Date : $TODAY"
          moved_count=0

          mkdir -p _archive

          shopt -s nullglob
          for file in _events/*.md; do
            [[ "$file" == *".gitkeep" ]] && continue
            filename=$(basename "$file")
            event_date=$(echo "$filename" | grep -o '^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}')
            [[ -z "$event_date" ]] && continue

            if [[ "$event_date" < "$TODAY" ]]; then
              dest="_archive/$filename"
              if [[ ! -f "$dest" ]]; then
                mv "$file" "$dest"
                echo "Archivé : $filename"
                moved_count=$((moved_count + 1))
              else
                rm "$file"
              fi
            fi
          done

          if [ $moved_count -gt 0 ]; then
            python3 - <<'PYEOF'
          import json, os, re

          def parse_fm(path):
              with open(path, encoding='utf-8') as f:
                  text = f.read()
              meta = {}
              m = re.match(r'^---(.*?)---', text, re.DOTALL)
              if not m:
                  return meta
              for line in m.group(1).splitlines():
                  kv = re.match(r'^(\w+):\s*"?([^"]*?)"?\s*$', line)
                  if kv:
                      meta[kv.group(1)] = kv.group(2).strip()
              return meta

          def build_list(folder):
              entries = []
              for fn in sorted(os.listdir(folder)):
                  if not fn.endswith('.md') or fn == '.gitkeep':
                      continue
                  meta = parse_fm(os.path.join(folder, fn))
                  if not meta.get('titre'):
                      continue
                  entry = {'titre': meta['titre'], 'date': meta.get('date',''), 'file': f'{folder}/{fn}'}
                  for k in ('heure', 'lieu', 'poster'):
                      if meta.get(k):
                          entry[k] = meta[k]
                  entries.append(entry)
              return entries

          events  = sorted(build_list('_events'),  key=lambda e: e['date'])
          archive = sorted(build_list('_archive'), key=lambda e: e['date'], reverse=True)

          os.makedirs('data', exist_ok=True)
          with open('data/events.json', 'w', encoding='utf-8') as f:
              json.dump(events, f, ensure_ascii=False, indent=2)
              f.write('\n')
          with open('data/archive.json', 'w', encoding='utf-8') as f:
              json.dump(archive, f, ensure_ascii=False, indent=2)
              f.write('\n')

          print(f"events.json : {len(events)} entree(s)")
          print(f"archive.json : {len(archive)} entree(s)")
          PYEOF
            echo "MOVED_COUNT=$moved_count" >> $GITHUB_ENV
          else
            echo "Aucun evenement a archiver."
            echo "MOVED_COUNT=0" >> $GITHUB_ENV
          fi

      - name: Commit changes
        if: env.MOVED_COUNT != '0'
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Archive automatique du $(date +%Y-%m-%d) - $MOVED_COUNT evenement(s) deplace(s)"
          git push
